<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discourse Markers</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <h1>📖 Discourse Markers</h1>
  <p>Here you’ll learn how to use discourse markers in English.</p>

  <button id="finishBtn">✅ Finish Lesson</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // make mini app full screen

    // user_id comes from Flask via URL /lesson/discourse_markers/<user_id>
    const userId = "{{ user_id }}";  
    const startTime = Date.now();

    document.getElementById("finishBtn").addEventListener("click", async () => {
      const endTime = Date.now();
      const duration = Math.floor((endTime - startTime) / 1000); // seconds spent

      await fetch("/log_time", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id: userId,
          duration: duration
        })
      });

      tg.close(); // close mini app and return to chat
    });
  </script>
</body>
</html>
