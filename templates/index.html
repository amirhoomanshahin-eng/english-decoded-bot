<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>English Decoded</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 { color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📖 English Decoded</h1>
    <p>Welcome to the mini-app! Your study time will be tracked automatically while this page is open.</p>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // expand full screen
    const user_id = tg.initDataUnsafe?.user?.id;

    let startTime = Date.now();

    // When user closes or hides app, send duration
    function sendTime() {
      const duration = Math.floor((Date.now() - startTime) / 1000); // seconds
      fetch("/track_time", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ user_id, duration })
      });
    }

    window.addEventListener("beforeunload", sendTime);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) sendTime();
      else startTime = Date.now(); // reset when visible again
    });
  </script>
</body>
</html>
