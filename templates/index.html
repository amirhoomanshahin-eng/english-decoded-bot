<head>

  <title>Discourse Markers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h1 {
      color: #333;
    }
  </style>
</head>
<body>
  <h1>📖 Discourse Markers</h1>
  <p>Discourse markers are words or phrases that organize our speech and writing.</p>
  <h2>Examples:</h2>
  <ul>
    <li><b>Firstly</b> – introduces the first point.</li>
    <li><b>However</b> – shows contrast.</li>
    <li><b>Therefore</b> – shows result.</li>
    <li><b>In conclusion</b> – signals the end.</li>
  </ul>
  <p>Use them to connect ideas clearly and smoothly!</p>
</body>
</html>
